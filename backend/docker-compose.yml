version: "3.9"

# Glorix v7 — Full stack (Glorix + Qdrant)
# Ollama запускается отдельно на хост-машине.
#
# Запуск: docker-compose up -d
# Первая индексация: docker-compose exec glorix python build_knowledge_base.py

services:
  qdrant:
    image: qdrant/qdrant:v1.11.3
    container_name: glorix_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  glorix:
    build: .
    container_name: glorix_api
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
    volumes:
      - ./data:/app/data:ro
    depends_on:
      qdrant:
        condition: service_healthy
    restart: unless-stopped

volumes:
  qdrant_data:
